name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Pillow
        run: pip install Pillow --break-system-packages

      - name: Fix launcher icons
        run: |
          for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            rm -f app/src/main/res/$dir/ic_launcher.xml
            rm -f app/src/main/res/$dir/ic_launcher_round.xml
          done
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os
          sizes = {
              'mipmap-mdpi': 48,
              'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96,
              'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192,
          }
          for folder, size in sizes.items():
              path = f'app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
              img = Image.new('RGBA', (size, size), (30, 30, 48, 255))
              draw = ImageDraw.Draw(img)
              margin = size // 8
              draw.ellipse([margin, margin, size-margin, size-margin], fill=(212, 175, 106, 255))
              m2 = size // 4
              draw.ellipse([m2, m2, size-m2, size-m2], fill=(30, 30, 48, 255))
              img.save(f'{path}/ic_launcher.png')
              img.save(f'{path}/ic_launcher_round.png')
              print(f'Created {size}x{size} icon in {folder}')
          PYEOF

      - name: Setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          EOF
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DailyMotivation-debug
          path: app/build/outputs/apk/debug/app-debug.apk
