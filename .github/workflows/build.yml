name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Fix launcher icons
        run: |
          # Remove adaptive XML icons from density folders (not supported below API 26)
          for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            rm -f app/src/main/res/$dir/ic_launcher.xml
            rm -f app/src/main/res/$dir/ic_launcher_round.xml
          done

          # Create a simple PNG icon using Python for all densities
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          sizes = {
              'mipmap-mdpi': 48,
              'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96,
              'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192,
          }

          for folder, size in sizes.items():
              path = f'app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
              img = Image.new('RGBA', (size, size), (30, 30, 48, 255))
              draw = ImageDraw.Draw(img)
              # Gold circle
              margin = size // 8
              draw.ellipse([margin, margin, size-margin, size-margin], fill=(212, 175, 106, 255))
              # Dark center
              m2 = size // 4
              draw.ellipse([m2, m2, size-m2, size-m2], fill=(30, 30, 48, 255))
              img.save(f'{path}/ic_launcher.png')
              img.save(f'{path}/ic_launcher_round.png')
              print(f'Created {size}x{size} icon in {folder}')
          PYEOF

      - name: Install Pillow
        run: pip install Pillow

      - name: Re-run icon generation with Pillow installed
        run: |
          python3 - << 'PYEOF'
          from PIL import Image, ImageDraw
          import os

          sizes = {
              'mipmap-mdpi': 48,
              'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96,
              'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192,
          }

          for folder, size in sizes.items():
              path = f'app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
              img = Image.new('RGBA', (size, size), (30, 30, 48, 255))
              draw = ImageDraw.Draw(img)
              margin = size // 8
              draw.ellipse([margin, margin, size-margin, size-margin], fill=(212, 175, 106, 255))
              m2 = size // 4
              draw.ellipse([m2, m2, size-m2, size-m2], fill=(30, 30, 48, 255))
              img.save(f'{path}/ic_launcher.png')
              img.save(f'{path}/ic_launcher_round.png')
              print(f'Created {size}x{size} icon in {folder}')
          PYEOF

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DailyMotivation-debug
          path: app/build/outputs/apk/debug/app-debug.apk
